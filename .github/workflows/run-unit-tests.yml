name: Run unit tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x

#      - name: Restore
#        run: dotnet restore QuantInfra.Core.sln
#
#      - name: Build
#        run: dotnet build QuantInfra.Core.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test QuantInfra.Core.sln --configuration Release