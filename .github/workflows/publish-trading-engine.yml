name: Publish Trading Engine Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version override"
        required: false
        type: string
      
      build_arm64:
        description: "Build ARM64 image"
        required: true
        default: false
        type: boolean

  push:
    tags:
      - "trading-engine-v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: quantinfrasolutions/trading-engine

jobs:
  tests:
    uses: ./.github/workflows/run-unit-tests.yml
    
  publish:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Calculate Version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"

            if [[ "$TAG" =~ ^trading-engine-v(.+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}"
            else
              echo "Invalid tag: $TAG"
              exit 1
            fi
          else
            BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
            SHA=$(git rev-parse --short HEAD)
            VERSION="${BRANCH}.${SHA}.${GITHUB_RUN_NUMBER}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Calculate platforms
        id: platforms
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.inputs.build_arm64 }}" == "true" ]]; then
            echo "value=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "value=linux/amd64" >> "$GITHUB_OUTPUT"
          fi
          
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/TradingEngine/Dockerfile
          push: true
          platforms: ${{ steps.platforms.outputs.value }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ github.ref_type == 'tag' && format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}